name: Android Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: 📥 Code auschecken
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 🛠️ MAUI Workload installieren
      run: dotnet workload install maui-android

    - name: 🧪 Unit Tests ausführen
      shell: pwsh
      run: .\scripts\run_tests.ps1

    - name: 📦 Android APK bauen
      shell: pwsh
      run: .\scripts\build_android_apk.ps1

    - name: 🚀 APK als temporäres Artifact hochladen (Immer)
      uses: actions/upload-artifact@v4
      with:
        name: PlatzPilot-Android-APK
        path: bin/Release/**/*.apk
        if-no-files-found: error

    - name: 🎉 Offiziellen GitHub Release erstellen (Nur bei Tags)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/Release/**/*.apk
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}