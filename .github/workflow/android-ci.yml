name: Android Build & Release

# Wann soll die Pipeline starten?
on:
  push:
    branches: [ "main", "master" ]
    # Neu: Reagiere auch auf Versions-Tags (z.B. v1.0.0, v2.1)
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

# Erlaubnis für den Bot, einen Release zu erstellen
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: 📥 Code auschecken
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 🛠️ MAUI Workload installieren
      run: dotnet workload install maui-android

    - name: 🧪 Unit Tests ausführen
      shell: pwsh
      run: .\scripts\run_tests.ps1

    - name: 📦 Android APK bauen
      shell: pwsh
      run: .\scripts\build_android_apk.ps1

    - name: 🚀 APK als temporäres Artifact hochladen (Immer)
      uses: actions/upload-artifact@v4
      with:
        name: PlatzPilot-Android-APK
        path: bin\Release\net10.0-android\publish\*.apk
        if-no-files-found: error

    - name: 🎉 Offiziellen GitHub Release erstellen (Nur bei Tags)
      # Dieser Schritt läuft NUR, wenn ein Tag gepusht wurde, der mit "v" beginnt
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin\Release\net10.0-android\publish\*.apk
        generate_release_notes: true